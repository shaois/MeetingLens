<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時會議翻譯 - WAV 格式修復版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 16px; color: #2d3748; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-danger { background: #f56565; color: white; }
        .btn-secondary { background: #718096; color: white; margin-left: 8px; }
        
        .record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .record-btn.recording {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(245, 101, 101, 0); }
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
        }
        .status.error { background: #fed7d7; color: #742a2a; }
        .status.success { background: #c6f6d5; color: #22543d; }
        .status.info { background: #bee3f8; color: #2a4365; }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .result-panel {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .segment {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }
        .segment-time {
            font-size: 12px;
            color: #718096;
            margin-bottom: 4px;
        }
        
        .debug-log {
            background: #1a202c;
            color: #48bb78;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 12px;
        }
        
        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🎤 即時會議翻譯 (WAV 格式)</h2>
            
            <div class="form-group">
                <label>Groq API Key:</label>
                <input type="password" id="apiKey" placeholder="gsk_xxxxx...">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>來源語言:</label>
                    <select id="sourceLang">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目標語言:</label>
                    <select id="targetLang">
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
            <div id="statusText" style="text-align: center; font-size: 16px; margin: 10px 0;">
                點擊按鈕開始錄音
            </div>
            <div id="statusDiv"></div>
            
            <div id="debugSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; margin-top: 16px;">
                    <strong>除錯日誌:</strong>
                    <button class="btn btn-secondary" onclick="clearDebug()" style="padding: 4px 8px;">清除</button>
                </div>
                <div class="debug-log" id="debugLog"></div>
            </div>
        </div>

        <div class="results-grid">
            <div class="card">
                <h3>原文轉錄 <span id="sourceBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">EN</span></h3>
                <div class="result-panel" id="originalText"></div>
            </div>
            <div class="card">
                <h3>翻譯結果 <span id="targetBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">ZH</span></h3>
                <div class="result-panel" id="translatedText"></div>
            </div>
        </div>

        <div style="margin-top: 16px;">
            <button class="btn btn-primary" onclick="exportTranscript()" id="exportBtn" disabled>📥 匯出</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑 清除</button>
        </div>
    </div>

    <script>
        // ==================== 狀態管理 ====================
        const state = {
            isRecording: false,
            audioContext: null,
            mediaStream: null,
            scriptProcessor: null,
            audioData: [],
            segments: [],
            translations: [],
            startTime: null,
            isProcessing: false,
            sampleRate: 16000
        };

        // ==================== 工具函數 ====================
        function debug(msg) {
            const section = document.getElementById('debugSection');
            const log = document.getElementById('debugLog');
            section.style.display = 'block';
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }

        function clearDebug() {
            document.getElementById('debugLog').innerHTML = '';
        }

        function showStatus(msg, type = 'info') {
            document.getElementById('statusDiv').innerHTML = `<div class="status ${type}">${msg}</div>`;
            debug(msg);
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60);
            return `${m.toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        // ==================== WAV 編碼器 ====================
        function floatTo16BitPCM(output, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);
            floatTo16BitPCM(view, 44, samples);

            return new Blob([view], { type: 'audio/wav' });
        }

        function mergeBuffers(buffers, sampleRate) {
            const length = buffers.reduce((acc, buf) => acc + buf.length, 0);
            const result = new Float32Array(length);
            let offset = 0;
            for (const buf of buffers) {
                result.set(buf, offset);
                offset += buf.length;
            }
            return result;
        }

        // ==================== 錄音控制 ====================
        async function toggleRecording() {
            if (!state.isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showStatus('❌ 請輸入 API Key', 'error');
                return;
            }

            try {
                debug('請求麥克風權限...');
                state.mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: state.sampleRate,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                state.audioContext = new AudioContext({ sampleRate: state.sampleRate });
                const source = state.audioContext.createMediaStreamSource(state.mediaStream);
                
                // 使用 ScriptProcessorNode 收集音訊
                state.scriptProcessor = state.audioContext.createScriptProcessor(4096, 1, 1);
                state.audioData = [];

                state.scriptProcessor.onaudioprocess = (event) => {
                    if (!state.isRecording) return;
                    const inputData = event.inputBuffer.getChannelData(0);
                    // 複製資料
                    state.audioData.push(new Float32Array(inputData));
                };

                source.connect(state.scriptProcessor);
                state.scriptProcessor.connect(state.audioContext.destination);

                state.isRecording = true;
                state.startTime = Date.now();
                state.segments = [];
                state.translations = [];

                // 每 5 秒處理一次
                state.processInterval = setInterval(() => {
                    if (state.audioData.length > 0 && !state.isProcessing) {
                        processAudioChunk();
                    }
                }, 5000);

                // 更新 UI
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                document.getElementById('statusText').textContent = '🔴 錄音中... (使用 WAV 格式)';
                
                showStatus('✓ 錄音開始 (WAV 格式)', 'success');
                debug('錄音開始');

            } catch (error) {
                showStatus('❌ ' + error.message, 'error');
                debug('錯誤: ' + error.message);
            }
        }

        function stopRecording() {
            state.isRecording = false;
            
            if (state.processInterval) {
                clearInterval(state.processInterval);
            }

            // 處理最後一個 chunk
            if (state.audioData.length > 0) {
                processAudioChunk(true);
            }

            // 清理
            if (state.scriptProcessor) {
                state.scriptProcessor.disconnect();
            }
            if (state.mediaStream) {
                state.mediaStream.getTracks().forEach(track => track.stop());
            }
            if (state.audioContext) {
                state.audioContext.close();
            }

            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording');
            document.getElementById('statusText').textContent = '⏹ 已停止';
            
            showStatus('✓ 錄音停止', 'info');
            debug('錄音停止');
        }

        async function processAudioChunk(isFinal = false) {
            if (state.audioData.length === 0 || state.isProcessing) return;

            state.isProcessing = true;
            const chunks = [...state.audioData];
            state.audioData = [];

            try {
                debug(`編碼 WAV (${chunks.length} buffers)...`);
                
                // 合併並編碼為 WAV
                const samples = mergeBuffers(chunks, state.sampleRate);
                const wavBlob = encodeWAV(samples, state.sampleRate);
                
                debug(`WAV 大小: ${(wavBlob.size / 1024).toFixed(2)} KB`);

                await transcribeAudio(wavBlob);

            } catch (error) {
                showStatus('❌ 處理錯誤: ' + error.message, 'error');
                debug('錯誤: ' + error.message);
            } finally {
                state.isProcessing = false;
            }
        }

        async function transcribeAudio(blob) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            
            const langMap = {
                'en': 'en', 'zh': 'zh', 'ja': 'ja', 'ko': 'ko',
                'es': 'es', 'fr': 'fr', 'de': 'de'
            };

            const formData = new FormData();
            formData.append('file', blob, 'audio.wav');
            formData.append('model', 'whisper-large-v3-turbo');
            formData.append('language', langMap[sourceLang] || 'en');
            formData.append('response_format', 'json');

            debug('發送到 Groq API...');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });

                debug(`API 狀態: ${response.status}`);

                if (!response.ok) {
                    const error = await response.text();
                    debug(`API 錯誤: ${error}`);
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                const data = await response.json();
                const text = (data.text || '').trim();

                if (text) {
                    debug(`轉錄成功: "${text}"`);
                    const timestamp = formatTime(Date.now() - state.startTime);
                    addSegment(text, timestamp);
                    await translateText(text);
                    showStatus('✓ 轉錄成功', 'success');
                } else {
                    debug('未偵測到語音');
                }

            } catch (error) {
                debug('API 錯誤: ' + error.message);
                showStatus('❌ ' + error.message, 'error');
                throw error;
            }
        }

        async function translateText(text) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const targetLang = document.getElementById('targetLang').value;
            
            const langNames = {
                'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English'
            };

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'system', content: `翻譯成${langNames[targetLang] || targetLang}，只輸出結果` },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const translation = data.choices?.[0]?.message?.content?.trim();

                if (translation) {
                    debug(`翻譯: "${translation}"`);
                    addTranslation(translation);
                }

            } catch (error) {
                debug('翻譯失敗: ' + error.message);
            }
        }

        function addSegment(text, timestamp) {
            state.segments.push({ text, timestamp });
            const container = document.getElementById('originalText');
            
            if (container.children.length === 0) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = 'segment';
            div.innerHTML = `
                <div class="segment-time">${timestamp}</div>
                <div>${text}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            document.getElementById('exportBtn').disabled = false;
        }

        function addTranslation(text) {
            state.translations.push(text);
            const container = document.getElementById('translatedText');
            
            const div = document.createElement('div');
            div.className = 'segment';
            div.style.borderLeftColor = '#48bb78';
            div.innerHTML = `<div>${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function exportTranscript() {
            let content = `會議記錄\n時間: ${new Date().toLocaleString()}\n\n`;
            state.segments.forEach(s => {
                content += `[${s.timestamp}] ${s.text}\n`;
            });
            content += `\n翻譯:\n`;
            state.translations.forEach(t => {
                content += `${t}\n`;
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `transcript_${Date.now()}.txt`;
            a.click();
            
            showStatus('✓ 已匯出', 'success');
        }

        function clearAll() {
            state.segments = [];
            state.translations = [];
            state.audioData = [];
            document.getElementById('originalText').innerHTML = '';
            document.getElementById('translatedText').innerHTML = '';
            document.getElementById('exportBtn').disabled = true;
            showStatus('✓ 已清除', 'info');
        }

        // 初始化
        window.addEventListener('load', () => {
            const key = localStorage.getItem('groqApiKey');
            if (key) document.getElementById('apiKey').value = key;
        });

        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('groqApiKey', e.target.value);
        });

        document.getElementById('sourceLang').addEventListener('change', () => {
            document.getElementById('sourceBadge').textContent = document.getElementById('sourceLang').value.toUpperCase();
        });

        document.getElementById('targetLang').addEventListener('change', () => {
            document.getElementById('targetBadge').textContent = document.getElementById('targetLang').value.toUpperCase();
        });

        window.addEventListener('beforeunload', () => {
            if (state.isRecording) stopRecording();
        });
    </script>
</body>
</html>
