<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時會議翻譯 - 0.5秒超低延遲版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 16px; color: #2d3748; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #718096; color: white; margin-left: 8px; }
        
        .record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
        }
        .record-btn.recording {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(245, 101, 101, 0); }
        }
        
        .speed-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 8px;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(245, 87, 108, 0.5); }
            50% { box-shadow: 0 0 20px rgba(245, 87, 108, 0.8); }
        }
        
        .latency-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 12px;
        }
        .latency-good { background: #c6f6d5; color: #22543d; }
        .latency-warn { background: #fefcbf; color: #744210; }
        .latency-bad { background: #fed7d7; color: #742a2a; }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .status.error { background: #fed7d7; color: #742a2a; }
        .status.success { background: #c6f6d5; color: #22543d; }
        .status.info { background: #bee3f8; color: #2a4365; }
        .status.processing { background: #fefcbf; color: #744210; }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .result-panel {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .segment {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .segment-time {
            font-size: 11px;
            color: #718096;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .debug-log {
            background: #1a202c;
            color: #48bb78;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 12px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .stat-item {
            background: #f7fafc;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            color: #718096;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #2d3748;
        }
        
        .queue-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: #e6fffa;
            border-radius: 4px;
            font-size: 12px;
            color: #234e52;
        }
        
        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🎤 即時會議翻譯 <span class="speed-badge">⚡ 0.5秒模式</span></h2>
            
            <div class="form-group">
                <label>Groq API Key:</label>
                <input type="password" id="apiKey" placeholder="gsk_xxxxx...">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>來源語言:</label>
                    <select id="sourceLang">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目標語言:</label>
                    <select id="targetLang">
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
            </div>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
            
            <div class="status" id="statusDiv">
                <span id="statusText">點擊按鈕開始超高速錄音</span>
            </div>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat-item">
                    <div class="stat-label">⏱️ 延遲</div>
                    <div class="stat-value" id="latencyValue">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">📝 段落</div>
                    <div class="stat-value" id="segmentCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">🔊 音量</div>
                    <div class="stat-value" id="volumeLevel">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏱️ 時長</div>
                    <div class="stat-value" id="duration">0:00</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">📊 隊列</div>
                    <div class="stat-value" id="queueCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">🎯 API calls</div>
                    <div class="stat-value" id="apiCalls">0</div>
                </div>
            </div>
            
            <div id="debugSection" style="display: none; margin-top: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong style="font-size: 13px;">🔧 即時日誌 (0.5s):</strong>
                    <button class="btn btn-secondary" onclick="clearDebug()" style="padding: 4px 8px; font-size: 11px;">清除</button>
                </div>
                <div class="debug-log" id="debugLog"></div>
            </div>
        </div>

        <div class="results-grid">
            <div class="card">
                <h3>📝 原文轉錄 <span id="sourceBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">EN</span></h3>
                <div class="result-panel" id="originalText">
                    <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                        <div style="font-size: 48px; margin-bottom: 8px;">🎤</div>
                        <div>語音轉錄將即時顯示 (0.5s)</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>🌐 翻譯結果 <span id="targetBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">ZH</span></h3>
                <div class="result-panel" id="translatedText">
                    <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                        <div style="font-size: 48px; margin-bottom: 8px;">🌐</div>
                        <div>翻譯結果將即時顯示</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 16px;">
            <button class="btn btn-primary" onclick="exportTranscript()" id="exportBtn" disabled>📥 匯出文字</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑 清除全部</button>
        </div>
    </div>

    <script>
        // ==================== 配置 - 0.5秒超高速模式 ====================
        const CONFIG = {
            sampleRate: 16000,
            bufferSize: 1024,           // 更小的緩衝區 (512/1024/2048)
            processInterval: 500,       // 0.5 秒處理間隔 ⚡
            minAudioLength: 0.3,        // 最少 0.3 秒才處理
            maxRetries: 2,
            translationDebounce: 400,   // 更短的翻譯防抖動
            maxQueueSize: 3,            // 最大隊列長度
            apiCallInterval: 450,       // API 呼叫最小間隔 (避免 rate limit)
        };

        // ==================== 狀態管理 ====================
        const state = {
            isRecording: false,
            audioContext: null,
            mediaStream: null,
            scriptProcessor: null,
            analyser: null,
            audioData: [],
            segments: [],
            translations: [],
            startTime: null,
            isProcessing: false,
            currentVolume: 0,
            lastProcessTime: 0,
            lastAPICallTime: 0,
            translationTimeout: null,
            retryCount: 0,
            requestQueue: [],
            isProcessingQueue: false,
            apiCallCount: 0,
            lastLatency: 0
        };

        // ==================== 工具函數 ====================
        function debug(msg, data = null) {
            const section = document.getElementById('debugSection');
            const log = document.getElementById('debugLog');
            section.style.display = 'block';
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('zh-TW', { 
                hour12: false, 
                hour:'2-digit', 
                minute:'2-digit', 
                second:'2-digit', 
                fractionalSecondDigits: 3 
            });
            let text = `[${time}] ${msg}`;
            if (data) text += ` => ${JSON.stringify(data)}`;
            div.textContent = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            while (log.children.length > 100) log.removeChild(log.firstChild);
        }

        function clearDebug() {
            document.getElementById('debugLog').innerHTML = '';
        }

        function updateStatus(msg, type = 'info', showLatency = false) {
            const div = document.getElementById('statusDiv');
            let latencyHtml = '';
            if (showLatency && state.lastLatency) {
                const latency = state.lastLatency;
                let latencyClass = latency < 800 ? 'latency-good' : latency < 1500 ? 'latency-warn' : 'latency-bad';
                let latencyText = latency < 800 ? '⚡' : latency < 1500 ? '⚠️' : '🐢';
                latencyHtml = `<span class="latency-indicator ${latencyClass}">${latencyText} ${latency}ms</span>`;
            }
            const queueHtml = state.requestQueue.length > 0 ? 
                `<span class="queue-indicator">隊列: ${state.requestQueue.length}</span>` : '';
            div.innerHTML = `<span>${msg}</span>${latencyHtml}${queueHtml}`;
            div.className = `status ${type}`;
            debug(msg);
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60);
            return `${m}:${(s%60).toString().padStart(2,'0')}`;
        }

        function updateStats() {
            document.getElementById('segmentCount').textContent = state.segments.length;
            document.getElementById('volumeLevel').textContent = Math.round(state.currentVolume) + '%';
            document.getElementById('queueCount').textContent = state.requestQueue.length;
            document.getElementById('apiCalls').textContent = state.apiCallCount;
            
            if (state.startTime) {
                const duration = Date.now() - state.startTime;
                const s = Math.floor(duration / 1000);
                const m = Math.floor(s / 60);
                document.getElementById('duration').textContent = `${m}:${(s%60).toString().padStart(2,'0')}`;
            }
        }

        // ==================== WAV 編碼器 ====================
        function floatTo16BitPCM(output, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);
            floatTo16BitPCM(view, 44, samples);

            return new Blob([view], { type: 'audio/wav' });
        }

        function mergeBuffers(buffers) {
            const length = buffers.reduce((acc, buf) => acc + buf.length, 0);
            const result = new Float32Array(length);
            let offset = 0;
            for (const buf of buffers) {
                result.set(buf, offset);
                offset += buf.length;
            }
            return result;
        }

        // ==================== 隊列管理 ====================
        async function processQueue() {
            if (state.isProcessingQueue || state.requestQueue.length === 0) return;
            
            state.isProcessingQueue = true;
            
            while (state.requestQueue.length > 0) {
                // 檢查是否超過 API 呼叫間隔
                const now = Date.now();
                const timeSinceLastCall = now - state.lastAPICallTime;
                
                if (timeSinceLastCall < CONFIG.apiCallInterval) {
                    await sleep(CONFIG.apiCallInterval - timeSinceLastCall);
                }
                
                const request = state.requestQueue.shift();
                await processRequest(request);
                updateStats();
            }
            
            state.isProcessingQueue = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function processRequest(request) {
            const { blob, timestamp, processStartTime } = request;
            await transcribeAudio(blob, timestamp, processStartTime);
        }

        // ==================== 錄音控制 ====================
        async function toggleRecording() {
            if (!state.isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                updateStatus('❌ 請先輸入 API Key', 'error');
                return;
            }

            try {
                debug('🚀 初始化超高速音訊系統 (0.5s)...');
                state.mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: CONFIG.sampleRate,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                state.audioContext = new AudioContext({ sampleRate: CONFIG.sampleRate });
                const source = state.audioContext.createMediaStreamSource(state.mediaStream);
                
                // 音量分析
                state.analyser = state.audioContext.createAnalyser();
                state.analyser.fftSize = 256;
                source.connect(state.analyser);
                
                // 使用超小緩衝區
                state.scriptProcessor = state.audioContext.createScriptProcessor(CONFIG.bufferSize, 1, 1);
                state.audioData = [];

                state.scriptProcessor.onaudioprocess = (event) => {
                    if (!state.isRecording) return;
                    const inputData = event.inputBuffer.getChannelData(0);
                    state.audioData.push(new Float32Array(inputData));
                    
                    // 計算音量
                    if (state.analyser) {
                        const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
                        state.analyser.getByteFrequencyData(dataArray);
                        state.currentVolume = dataArray.reduce((a,b) => a+b, 0) / dataArray.length / 255 * 100;
                    }
                };

                source.connect(state.scriptProcessor);
                state.scriptProcessor.connect(state.audioContext.destination);

                state.isRecording = true;
                state.startTime = Date.now();
                state.segments = [];
                state.translations = [];
                state.lastProcessTime = Date.now();
                state.requestQueue = [];
                state.apiCallCount = 0;

                // 啟動音量監控
                startVolumeMonitor();

                // 超高速處理循環 - 每 0.5 秒 ⚡
                state.processInterval = setInterval(() => {
                    processAudioChunk();
                }, CONFIG.processInterval);

                // 啟動隊列處理
                state.queueInterval = setInterval(() => {
                    processQueue();
                }, 100);

                // 更新 UI
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                document.getElementById('stats').style.display = 'grid';
                updateStatus('🔴 超高速錄音中 (0.5秒)', 'success', true);
                
                debug(`✓ 錄音開始 | 緩衝區: ${CONFIG.bufferSize} | 間隔: ${CONFIG.processInterval}ms | API間隔: ${CONFIG.apiCallInterval}ms`);

            } catch (error) {
                updateStatus('❌ ' + error.message, 'error');
                debug('錯誤: ' + error.message);
            }
        }

        function startVolumeMonitor() {
            state.volumeInterval = setInterval(() => {
                if (state.isRecording) {
                    updateStats();
                }
            }, 100);
        }

        function stopRecording() {
            state.isRecording = false;
            
            clearInterval(state.processInterval);
            clearInterval(state.volumeInterval);
            clearInterval(state.queueInterval);
            
            if (state.translationTimeout) {
                clearTimeout(state.translationTimeout);
            }

            // 處理最後一個 chunk
            if (state.audioData.length > 0) {
                processAudioChunk(true);
            }

            // 等待隊列處理完成
            setTimeout(() => {
                cleanup();
            }, 2000);

            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording');
            document.getElementById('stats').style.display = 'none';
            updateStatus('⏹ 已停止錄音', 'info');
            
            debug('✓ 錄音停止');
        }

        function cleanup() {
            if (state.scriptProcessor) {
                state.scriptProcessor.disconnect();
            }
            if (state.mediaStream) {
                state.mediaStream.getTracks().forEach(track => track.stop());
            }
            if (state.audioContext) {
                state.audioContext.close();
            }
        }

        async function processAudioChunk(isFinal = false) {
            if (state.audioData.length === 0) return;
            
            // 如果隊列已滿，跳過
            if (!isFinal && state.requestQueue.length >= CONFIG.maxQueueSize) {
                debug('⚠️ 隊列已滿，跳過本次處理');
                state.audioData = []; // 清空避免累積
                return;
            }

            const now = Date.now();
            const timeSinceLastProcess = now - state.lastProcessTime;
            
            // 如果距離上次處理太短，跳過
            if (!isFinal && timeSinceLastProcess < CONFIG.processInterval - 100) {
                return;
            }

            state.lastProcessTime = now;
            
            // 取出所有緩衝區
            const chunks = [...state.audioData];
            state.audioData = [];

            const processStartTime = Date.now();

            try {
                // 合併音訊
                const samples = mergeBuffers(chunks);
                const duration = samples.length / CONFIG.sampleRate;
                
                // 如果音訊太短，跳過（除非是最後一個）
                if (!isFinal && duration < CONFIG.minAudioLength) {
                    debug(`⏭ 音訊太短 (${duration.toFixed(2)}s)`);
                    return;
                }

                // 編碼 WAV
                const wavBlob = encodeWAV(samples, CONFIG.sampleRate);
                const sizeKB = (wavBlob.size / 1024).toFixed(1);
                
                debug(`📦 音訊: ${duration.toFixed(2)}s | ${sizeKB}KB | 隊列: ${state.requestQueue.length}`);

                // 加入隊列
                state.requestQueue.push({
                    blob: wavBlob,
                    timestamp: formatTime(now - state.startTime),
                    processStartTime: processStartTime
                });

                updateStats();

            } catch (error) {
                debug('❌ 處理錯誤: ' + error.message);
            }
        }

        async function transcribeAudio(blob, timestamp, processStartTime) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            
            const langMap = {
                'en': 'en', 'zh': 'zh', 'ja': 'ja', 'ko': 'ko',
                'es': 'es', 'fr': 'fr', 'de': 'de'
            };

            const formData = new FormData();
            formData.append('file', blob, 'audio.wav');
            formData.append('model', 'whisper-large-v3-turbo');
            formData.append('language', langMap[sourceLang] || 'en');
            formData.append('response_format', 'json');
            formData.append('temperature', '0');

            state.lastAPICallTime = Date.now();
            state.apiCallCount++;

            try {
                debug(`🚀 API 請求 #${state.apiCallCount}...`);
                updateStatus('⏳ 處理中...', 'processing');

                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.text();
                    if (response.status === 429) {
                        debug('⚠️ Rate limit，等待後重試');
                        await sleep(1000);
                        // 重新加入隊列
                        state.requestQueue.unshift({ blob, timestamp, processStartTime });
                        return;
                    }
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                const data = await response.json();
                const text = (data.text || '').trim();

                // 計算延遲
                const latency = Date.now() - processStartTime;
                state.lastLatency = latency;

                if (text) {
                    debug(`✓ 成功 (${latency}ms): "${text.substring(0, 40)}..."`);
                    addSegment(text, timestamp);
                    triggerTranslation(text);
                    updateStatus(`✓ 處理完成`, 'success', true);
                    state.retryCount = 0;
                } else {
                    debug('ℹ 未偵測到語音');
                }

            } catch (error) {
                debug('❌ API 錯誤: ' + error.message);
                if (state.retryCount < CONFIG.maxRetries) {
                    state.retryCount++;
                    state.requestQueue.unshift({ blob, timestamp, processStartTime });
                    debug(`🔄 重試 ${state.retryCount}/${CONFIG.maxRetries}`);
                }
            }
        }

        function triggerTranslation(text) {
            if (state.translationTimeout) {
                clearTimeout(state.translationTimeout);
            }
            
            state.translationTimeout = setTimeout(() => {
                translateText(text);
            }, CONFIG.translationDebounce);
        }

        async function translateText(text) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const targetLang = document.getElementById('targetLang').value;
            
            const langNames = {
                'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English',
                'ja': '日本語', 'ko': '한국어'
            };

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'system', content: `專業翻譯，將以下內容翻譯成${langNames[targetLang] || targetLang}，只輸出翻譯結果` },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const translation = data.choices?.[0]?.message?.content?.trim();

                if (translation) {
                    debug(`✓ 翻譯: "${translation.substring(0, 40)}..."`);
                    addTranslation(translation);
                }

            } catch (error) {
                debug('❌ 翻譯失敗: ' + error.message);
            }
        }

        function addSegment(text, timestamp) {
            state.segments.push({ text, timestamp });
            const container = document.getElementById('originalText');
            
            if (container.querySelector('[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = 'segment';
            div.innerHTML = `
                <div class="segment-time">
                    <span class="live-indicator"></span>
                    ${timestamp}
                </div>
                <div style="font-size: 14px; line-height: 1.5;">${escapeHtml(text)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            document.getElementById('exportBtn').disabled = false;
            updateStats();
        }

        function addTranslation(text) {
            state.translations.push(text);
            const container = document.getElementById('translatedText');
            
            if (container.querySelector('[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = 'segment';
            div.style.borderLeftColor = '#48bb78';
            div.innerHTML = `
                <div style="font-size: 14px; line-height: 1.5;">${escapeHtml(text)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function exportTranscript() {
            let content = `會議記錄\n時間: ${new Date().toLocaleString('zh-TW')}\n模式: 0.5秒超高速\n\n`;
            state.segments.forEach(s => {
                content += `[${s.timestamp}] ${s.text}\n`;
            });
            content += `\n翻譯:\n`;
            state.translations.forEach(t => {
                content += `${t}\n`;
            });

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `transcript_${Date.now()}.txt`;
            a.click();
            
            updateStatus('✓ 已匯出檔案', 'success');
        }

        function clearAll() {
            state.segments = [];
            state.translations = [];
            state.audioData = [];
            state.requestQueue = [];
            state.retryCount = 0;
            state.apiCallCount = 0;
            
            document.getElementById('originalText').innerHTML = `
                <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                    <div style="font-size: 48px; margin-bottom: 8px;">🎤</div>
                    <div>語音轉錄將即時顯示 (0.5s)</div>
                </div>
            `;
            document.getElementById('translatedText').innerHTML = `
                <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                    <div style="font-size: 48px; margin-bottom: 8px;">🌐</div>
                    <div>翻譯結果將即時顯示</div>
                </div>
            `;
            document.getElementById('exportBtn').disabled = true;
            clearDebug();
            updateStats();
            updateStatus('✓ 已清除', 'info');
        }

        // 初始化
        window.addEventListener('load', () => {
            const key = localStorage.getItem('groqApiKey');
            if (key) document.getElementById('apiKey').value = key;
        });

        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('groqApiKey', e.target.value);
        });

        document.getElementById('sourceLang').addEventListener('change', () => {
            document.getElementById('sourceBadge').textContent = document.getElementById('sourceLang').value.toUpperCase();
        });

        document.getElementById('targetLang').addEventListener('change', () => {
            document.getElementById('targetBadge').textContent = document.getElementById('targetLang').value.toUpperCase();
        });

        window.addEventListener('beforeunload', () => {
            if (state.isRecording) stopRecording();
        });
    </script>
</body>
</html>
