<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時會議翻譯 - 修復版</title>
    <style>
        /* 使用之前的 CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .record-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 40px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        .record-btn.recording {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(245, 101, 101, 0); }
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        .status.error { background: #fed7d7; color: #742a2a; }
        .status.success { background: #c6f6d5; color: #22543d; }
        .status.info { background: #bee3f8; color: #2a4365; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🎤 即時會議翻譯轉錄</h2>
            
            <div style="margin: 16px 0;">
                <label><strong>Groq API Key:</strong></label>
                <input type="password" id="apiKey" placeholder="gsk_xxxxx...">
                <small style="color: #718096;">從 <a href="https://console.groq.com/keys" target="_blank">https://console.groq.com/keys</a> 取得</small>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label><strong>來源語言:</strong></label>
                    <select id="sourceLang">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
                <div>
                    <label><strong>目標語言:</strong></label>
                    <select id="targetLang">
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
            <div id="statusText" style="text-align: center; font-size: 16px; margin: 10px 0;">
                點擊按鈕開始錄音
            </div>

            <div id="statusDiv"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="card">
                <h3>原文轉錄</h3>
                <div id="originalText" style="min-height: 200px; padding: 12px; background: #f7fafc; border-radius: 8px; margin-top: 8px;"></div>
            </div>
            <div class="card">
                <h3>翻譯結果</h3>
                <div id="translatedText" style="min-height: 200px; padding: 12px; background: #f7fafc; border-radius: 8px; margin-top: 8px;"></div>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioContext = null;
        let analyser = null;

        function showStatus(message, type = 'info') {
            const div = document.getElementById('statusDiv');
            div.innerHTML = `<div class="status ${type}">${message}</div>`;
            console.log(message);
        }

        async function toggleRecording() {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showStatus('請先輸入 Groq API Key', 'error');
                return;
            }

            if (!apiKey.startsWith('gsk_')) {
                showStatus('錯誤：API Key 應該以 gsk_ 開頭', 'error');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });

                // 檢查支援的 MIME type
                let mimeType = '';
                const types = ['audio/webm', 'audio/webm;codecs=opus', 'audio/ogg;codecs=opus'];
                for (const type of types) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        mimeType = type;
                        break;
                    }
                }

                if (!mimeType) {
                    throw new Error('瀏覽器不支援任何音訊編碼格式');
                }

                showStatus(`使用格式: ${mimeType}`, 'info');
                console.log('使用 MIME type:', mimeType);

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    audioBitsPerSecond: 64000
                });

                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        await processAudio(true);
                    }
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start(1000); // 每 1 秒收集一次
                isRecording = true;

                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('statusText').textContent = '🔴 錄音中...';
                showStatus('錄音已開始', 'success');

                // 每 3 秒處理一次
                window.processInterval = setInterval(async () => {
                    if (audioChunks.length > 0 && isRecording) {
                        await processAudio(false);
                    }
                }, 3000);

            } catch (error) {
                showStatus('錯誤: ' + error.message, 'error');
                console.error(error);
            }
        }

        function stopRecording() {
            isRecording = false;
            if (window.processInterval) {
                clearInterval(window.processInterval);
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('statusText').textContent = '⏹ 已停止錄音';
            showStatus('錄音已停止', 'info');
        }

        async function processAudio(isFinal = false) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            
            if (audioChunks.length === 0) return;

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            console.log('音訊大小:', blob.size, 'bytes');

            if (blob.size === 0) {
                console.log('空音訊，跳過');
                return;
            }

            const formData = new FormData();
            formData.append('file', blob, 'audio.webm');
            formData.append('model', 'whisper-large-v3-turbo');
            formData.append('language', sourceLang === 'zh' ? 'zh' : sourceLang);
            formData.append('response_format', 'json');

            try {
                showStatus('正在處理...', 'info');
                
                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: formData
                });

                console.log('API 狀態:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API 錯誤:', errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                console.log('轉錄結果:', data);

                const text = (data.text || '').trim();
                
                if (text) {
                    document.getElementById('originalText').innerHTML += `<div style="margin: 8px 0; padding: 8px; background: white; border-radius: 4px;">${text}</div>`;
                    
                    // 觸發翻譯
                    await translateText(text, apiKey);
                    
                    if (!isFinal) {
                        audioChunks = [];
                    }
                    
                    showStatus('處理成功', 'success');
                } else {
                    showStatus('未偵測到語音', 'info');
                    audioChunks = [];
                }

            } catch (error) {
                showStatus('錯誤: ' + error.message, 'error');
                console.error(error);
            }
        }

        async function translateText(text, apiKey) {
            const targetLang = document.getElementById('targetLang').value;
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'system',
                                content: `請將以下內容翻譯成${targetLang}，只輸出翻譯結果`
                            },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`翻譯錯誤: ${response.status}`);
                }

                const data = await response.json();
                const translation = data.choices[0].message.content.trim();
                
                document.getElementById('translatedText').innerHTML += `<div style="margin: 8px 0; padding: 8px; background: white; border-radius: 4px;">${translation}</div>`;

            } catch (error) {
                console.error('翻譯錯誤:', error);
            }
        }

        // 載入儲存的 API Key
        window.onload = () => {
            const saved = localStorage.getItem('groqApiKey');
            if (saved) {
                document.getElementById('apiKey').value = saved;
            }
        };

        // 儲存 API Key
        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('groqApiKey', e.target.value.trim());
        });
    </script>
</body>
</html>
