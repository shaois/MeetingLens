<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時會議翻譯 - Groq API 修復版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 16px; color: #2d3748; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-danger { background: #f56565; color: white; }
        .btn-secondary { background: #718096; color: white; }
        
        .record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .record-btn:hover { transform: scale(1.05); }
        .record-btn.recording {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(245, 101, 101, 0); }
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            font-weight: 500;
        }
        .status.error { background: #fed7d7; color: #742a2a; }
        .status.success { background: #c6f6d5; color: #22543d; }
        .status.info { background: #bee3f8; color: #2a4365; }
        .status.warning { background: #fefcbf; color: #744210; }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .result-panel {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-panel h3 {
            margin-bottom: 12px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .segment {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }
        .segment-time {
            font-size: 12px;
            color: #718096;
            margin-bottom: 4px;
        }
        .segment-text {
            font-size: 14px;
            color: #2d3748;
            line-height: 1.5;
        }
        
        .debug-log {
            background: #1a202c;
            color: #48bb78;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .debug-log div { margin-bottom: 4px; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .action-buttons .btn {
            flex: 1;
            min-width: 120px;
        }
        
        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
            .record-btn { width: 100px; height: 100px; font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🎤 即時會議翻譯轉錄 (Groq API)</h2>
            
            <div class="form-group">
                <label>Groq API Key:</label>
                <input type="password" id="apiKey" placeholder="gsk_xxxxx...">
                <small style="color: #718096; display: block; margin-top: 4px;">
                    從 <a href="https://console.groq.com/keys" target="_blank" style="color: #667eea;">https://console.groq.com/keys</a> 取得
                </small>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>語音來源語言:</label>
                    <select id="sourceLang">
                        <option value="en">English</option>
                        <option value="zh">中文 (Chinese)</option>
                        <option value="ja">日本語 (Japanese)</option>
                        <option value="ko">한국어 (Korean)</option>
                        <option value="es">Español (Spanish)</option>
                        <option value="fr">Français (French)</option>
                        <option value="de">Deutsch (German)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>翻譯目標語言:</label>
                    <select id="targetLang">
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
            </div>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                <span id="recordIcon">🎤</span>
            </button>
            
            <div id="statusText" style="text-align: center; font-size: 16px; margin: 10px 0; font-weight: 600;">
                點擊按鈕開始錄音
            </div>

            <div id="statusDiv"></div>
            
            <div id="debugSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                    <h3 style="font-size: 14px;">🔧 除錯資訊</h3>
                    <button class="btn btn-secondary" onclick="clearDebug()" style="padding: 6px 12px; font-size: 12px;">清除</button>
                </div>
                <div class="debug-log" id="debugLog"></div>
            </div>
        </div>

        <div class="results-grid">
            <div class="card">
                <h3>📝 原文轉錄 <span id="sourceBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">EN</span></h3>
                <div class="result-panel" id="originalText">
                    <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                        <div style="font-size: 48px; margin-bottom: 8px;">🎤</div>
                        <div>轉錄文字將顯示於此</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>🌐 翻譯結果 <span id="targetBadge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">ZH-TW</span></h3>
                <div class="result-panel" id="translatedText">
                    <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                        <div style="font-size: 48px; margin-bottom: 8px;">🌐</div>
                        <div>翻譯結果將顯示於此</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="exportTranscript()" id="exportBtn" disabled>📥 匯出文字</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑 清除全部</button>
            <button class="btn btn-secondary" onclick="testAPI()">🧪 測試 API</button>
        </div>
    </div>

    <script>
        // ==================== 狀態管理 ====================
        const state = {
            isRecording: false,
            mediaRecorder: null,
            audioStream: null,
            audioChunks: [],
            segments: [],
            translations: [],
            startTime: null,
            processingQueue: [],
            isProcessing: false
        };

        // ==================== 初始化 ====================
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('groqApiKey');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
            updateBadges();
        });

        document.getElementById('sourceLang').addEventListener('change', updateBadges);
        document.getElementById('targetLang').addEventListener('change', updateBadges);
        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('groqApiKey', e.target.value.trim());
        });

        function updateBadges() {
            document.getElementById('sourceBadge').textContent = document.getElementById('sourceLang').value.toUpperCase();
            document.getElementById('targetBadge').textContent = document.getElementById('targetLang').value.toUpperCase();
        }

        // ==================== 除錯日誌 ====================
        function debug(message, data = null) {
            const debugSection = document.getElementById('debugSection');
            const debugLog = document.getElementById('debugLog');
            debugSection.style.display = 'block';
            
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            let text = `[${time}] ${message}`;
            if (data) {
                text += ' => ' + JSON.stringify(data);
            }
            div.textContent = text;
            debugLog.appendChild(div);
            debugLog.scrollTop = debugLog.scrollHeight;
            
            console.log(message, data);
        }

        function clearDebug() {
            document.getElementById('debugLog').innerHTML = '';
        }

        function showStatus(message, type = 'info') {
            const div = document.getElementById('statusDiv');
            div.innerHTML = `<div class="status ${type}">${message}</div>`;
            debug(message);
        }

        // ==================== 錄音控制 ====================
        async function toggleRecording() {
            if (!state.isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showStatus('❌ 請先輸入 Groq API Key', 'error');
                return;
            }

            if (!apiKey.startsWith('gsk_')) {
                showStatus('❌ API Key 格式錯誤（應該以 gsk_ 開頭）', 'error');
                return;
            }

            try {
                debug('請求麥克風權限...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                state.audioStream = stream;
                state.audioChunks = [];
                state.segments = [];
                state.translations = [];
                state.startTime = Date.now();

                // 檢查支援的 MIME type
                let mimeType = '';
                const types = [
                    'audio/webm',
                    'audio/webm;codecs=opus',
                    'audio/ogg;codecs=opus',
                    'audio/mp4',
                    'audio/mpeg'
                ];

                for (const type of types) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        mimeType = type;
                        break;
                    }
                }

                if (!mimeType) {
                    throw new Error('瀏覽器不支援任何音訊編碼格式');
                }

                debug(`使用 MIME type: ${mimeType}`);
                showStatus(`✓ 使用格式: ${mimeType}`, 'info');

                state.mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    audioBitsPerSecond: 128000
                });

                state.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        state.audioChunks.push(event.data);
                        debug(`收集音訊資料: ${event.data.size} bytes`);
                    }
                };

                state.mediaRecorder.onstop = async () => {
                    debug('MediaRecorder 停止');
                    if (state.audioChunks.length > 0) {
                        await processFinalChunk();
                    }
                    cleanup();
                };

                // 每 1 秒收集一次資料
                state.mediaRecorder.start(1000);
                state.isRecording = true;

                // 每 3 秒處理一次
                state.processInterval = setInterval(async () => {
                    if (state.audioChunks.length > 0 && !state.isProcessing) {
                        await processChunk();
                    }
                }, 3000);

                // 更新 UI
                const btn = document.getElementById('recordBtn');
                const icon = document.getElementById('recordIcon');
                const statusText = document.getElementById('statusText');
                
                btn.classList.add('recording');
                icon.textContent = '⬛';
                statusText.textContent = '🔴 錄音中... (每 3 秒處理一次)';

                showStatus('✓ 錄音已開始', 'success');
                debug('錄音開始');

            } catch (error) {
                showStatus('❌ 錯誤: ' + error.message, 'error');
                debug('錄音錯誤', error);
                console.error(error);
            }
        }

        function stopRecording() {
            state.isRecording = false;
            
            if (state.processInterval) {
                clearInterval(state.processInterval);
                state.processInterval = null;
            }

            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                state.mediaRecorder.stop();
            }

            // 更新 UI
            const btn = document.getElementById('recordBtn');
            const icon = document.getElementById('recordIcon');
            const statusText = document.getElementById('statusText');
            
            btn.classList.remove('recording');
            icon.textContent = '🎤';
            statusText.textContent = '⏹ 已停止錄音';

            showStatus('✓ 錄音已停止', 'info');
            debug('錄音停止');
        }

        function cleanup() {
            if (state.audioStream) {
                state.audioStream.getTracks().forEach(track => track.stop());
                state.audioStream = null;
            }
        }

        // ==================== 音訊處理 ====================
        async function processChunk() {
            if (state.audioChunks.length === 0 || state.isProcessing) {
                return;
            }

            state.isProcessing = true;
            const chunks = [...state.audioChunks];
            state.audioChunks = [];

            try {
                debug(`處理音訊片段 (${chunks.length} chunks)`);
                
                const blob = new Blob(chunks, { type: 'audio/webm' });
                debug(`音訊 Blob 大小: ${blob.size} bytes`);

                if (blob.size === 0) {
                    debug('空音訊，跳過');
                    return;
                }

                await transcribeAudio(blob, false);

            } catch (error) {
                showStatus('❌ 處理錯誤: ' + error.message, 'error');
                debug('處理錯誤', error);
                // 如果失敗，把 chunks 加回去
                state.audioChunks = [...chunks, ...state.audioChunks];
            } finally {
                state.isProcessing = false;
            }
        }

        async function processFinalChunk() {
            if (state.audioChunks.length === 0) return;

            state.isProcessing = true;
            debug('處理最後一個音訊片段...');

            try {
                const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                await transcribeAudio(blob, true);
            } catch (error) {
                showStatus('❌ 最終處理錯誤: ' + error.message, 'error');
                debug('最終處理錯誤', error);
            } finally {
                state.isProcessing = false;
                state.audioChunks = [];
            }
        }

        async function transcribeAudio(blob, isFinal) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            
            // 轉換語言代碼
            const langMap = {
                'en': 'en',
                'zh': 'zh',
                'zh-TW': 'zh',
                'zh-CN': 'zh',
                'ja': 'ja',
                'ko': 'ko',
                'es': 'es',
                'fr': 'fr',
                'de': 'de'
            };
            const langCode = langMap[sourceLang] || 'en';

            const formData = new FormData();
            formData.append('file', blob, 'audio.webm');
            formData.append('model', 'whisper-large-v3-turbo');
            formData.append('language', langCode);
            formData.append('response_format', 'json');
            formData.append('temperature', '0');

            debug('發送請求到 Groq API...', {
                model: 'whisper-large-v3-turbo',
                language: langCode,
                size: blob.size
            });

            try {
                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                        // 不設定 Content-Type，讓瀏覽器自動設定
                    },
                    body: formData
                });

                debug(`API 回應狀態: ${response.status}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    debug(`API 錯誤內容: ${errorText}`);
                    
                    let errorMessage = `HTTP ${response.status}`;
                    try {
                        const errorJson = JSON.parse(errorText);
                        if (errorJson.error?.message) {
                            errorMessage += ': ' + errorJson.error.message;
                        }
                    } catch (e) {
                        errorMessage += ': ' + errorText;
                    }
                    
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                debug('轉錄成功', data);

                const text = (data.text || '').trim();
                
                if (text) {
                    const elapsed = Date.now() - state.startTime;
                    const timestamp = formatTime(elapsed);
                    
                    addSegment(text, timestamp);
                    
                    // 觸發翻譯
                    await translateText(text);
                    
                    showStatus('✓ 轉錄成功', 'success');
                } else {
                    debug('未偵測到語音');
                    showStatus('ℹ 未偵測到語音', 'info');
                }

            } catch (error) {
                debug('轉錄失敗', error);
                throw error;
            }
        }

        // ==================== 翻譯 ====================
        async function translateText(text) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const targetLang = document.getElementById('targetLang').value;
            
            const langNames = {
                'zh-TW': '繁體中文',
                'zh-CN': '简体中文',
                'en': 'English',
                'ja': '日本語',
                'ko': '한국어'
            };
            const targetName = langNames[targetLang] || targetLang;

            debug(`開始翻譯成 ${targetName}...`);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'system',
                                content: `你是一個專業的會議翻譯助手。請將以下內容翻譯成${targetName}。只輸出翻譯結果，不要添加任何說明。`
                            },
                            {
                                role: 'user',
                                content: text
                            }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`翻譯 API 錯誤: ${response.status}`);
                }

                const data = await response.json();
                const translation = (data.choices?.[0]?.message?.content || '').trim();

                if (translation) {
                    debug('翻譯成功');
                    addTranslation(translation);
                }

            } catch (error) {
                debug('翻譯失敗', error);
                // 降級：顯示原文
                addTranslation(text + ' (翻譯失敗)');
            }
        }

        // ==================== UI 更新 ====================
        function addSegment(text, timestamp) {
            state.segments.push({ text, timestamp });
            
            const container = document.getElementById('originalText');
            
            // 移除 placeholder
            if (container.querySelector('[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const segment = document.createElement('div');
            segment.className = 'segment';
            segment.innerHTML = `
                <div class="segment-time">${timestamp}</div>
                <div class="segment-text">${escapeHtml(text)}</div>
            `;
            
            container.appendChild(segment);
            container.scrollTop = container.scrollHeight;
            
            document.getElementById('exportBtn').disabled = false;
        }

        function addTranslation(text) {
            state.translations.push(text);
            
            const container = document.getElementById('translatedText');
            
            // 移除 placeholder
            if (container.querySelector('[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const segment = document.createElement('div');
            segment.className = 'segment';
            segment.style.borderLeftColor = '#48bb78';
            segment.innerHTML = `
                <div class="segment-text">${escapeHtml(text)}</div>
            `;
            
            container.appendChild(segment);
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 工具功能 ====================
        function exportTranscript() {
            if (state.segments.length === 0) {
                showStatus('沒有可匯出的內容', 'error');
                return;
            }

            let content = `會議轉錄記錄\n`;
            content += `時間: ${new Date().toLocaleString('zh-TW')}\n`;
            content += `來源語言: ${document.getElementById('sourceLang').value}\n`;
            content += `目標語言: ${document.getElementById('targetLang').value}\n`;
            content += `${'='.repeat(50)}\n\n`;

            state.segments.forEach((seg, i) => {
                content += `[${seg.timestamp}] ${seg.text}\n`;
            });

            if (state.translations.length > 0) {
                content += `\n${'='.repeat(50)}\n翻譯:\n\n`;
                state.translations.forEach((trans, i) => {
                    content += `${trans}\n\n`;
                });
            }

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcript_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);

            showStatus('✓ 已匯出檔案', 'success');
        }

        function clearAll() {
            state.segments = [];
            state.translations = [];
            state.audioChunks = [];

            document.getElementById('originalText').innerHTML = `
                <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                    <div style="font-size: 48px; margin-bottom: 8px;">🎤</div>
                    <div>轉錄文字將顯示於此</div>
                </div>
            `;

            document.getElementById('translatedText').innerHTML = `
                <div style="text-align: center; color: #a0aec0; padding: 40px 0;">
                    <div style="font-size: 48px; margin-bottom: 8px;">🌐</div>
                    <div>翻譯結果將顯示於此</div>
                </div>
            `;

            document.getElementById('exportBtn').disabled = true;
            showStatus('✓ 已清除所有內容', 'info');
            debug('清除所有內容');
        }

        async function testAPI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showStatus('❌ 請先輸入 API Key', 'error');
                return;
            }

            showStatus('🧪 測試 API 連線...', 'info');
            debug('開始 API 測試...');

            try {
                // 測試模型列表
                const response = await fetch('https://api.groq.com/openai/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                debug('API 測試成功', data);
                
                const models = data.data?.map(m => m.id).join(', ') || '未知';
                showStatus(`✓ API 連線成功！可用模型: ${models}`, 'success');

            } catch (error) {
                debug('API 測試失敗', error);
                showStatus(`❌ API 測試失敗: ${error.message}`, 'error');
            }
        }

        // 頁面關閉時清理
        window.addEventListener('beforeunload', () => {
            if (state.isRecording) {
                stopRecording();
            }
            cleanup();
        });
    </script>
</body>
</html>
